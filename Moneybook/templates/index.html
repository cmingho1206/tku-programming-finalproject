<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneybook 記帳軟體</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 2rem auto;
            max-width: 900px;
            padding: 0 1rem;
            color: #1f2937;
        }
        h1, h2 { margin-bottom: 0.75rem; }
        .card {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        form {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.5rem;
            align-items: end;
        }
        label {
            display: flex;
            flex-direction: column;
            font-size: 0.9rem;
            gap: 0.3rem;
        }
        input, button {
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        button {
            cursor: pointer;
            background: #2563eb;
            color: #fff;
            border: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 0.6rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .total {
            margin-top: 0.75rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <h1>Moneybook 記帳軟體</h1>

    <section class="card">
        <h2>新增支出</h2>
        <form action="/add" method="post">
            <label>
                日期
                <input type="date" name="date" required>
            </label>
            <label>
                商店
                <input type="text" name="shop" placeholder="例：7-11" required>
            </label>
            <label>
                金額
                <input type="number" name="amount" step="0.01" min="0" required>
            </label>
            <button type="submit">新增紀錄</button>
        </form>
    </section>

    <section class="card">
        <h2>支出紀錄</h2>
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>商店</th>
                    <th>金額</th>
                </tr>
            </thead>
            <tbody>
            {% for item in expenses %}
                <tr>
                    <td>{{ item.date }}</td>
                    <td>{{ item.shop }}</td>
                    <td>{{ "%.2f"|format(item.amount) }}</td>
                </tr>
            {% else %}
                <tr>
                    <td colspan="3">目前沒有資料</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
        <p class="total">總支出：{{ "%.2f"|format(total) }}</p>
    </section>
</body>
</html>
